<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii Cafe Menu</title>
    <style>
        body {
            background-color: #fdf6e3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5d4037;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .menu-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }
        .menu-item {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s;
        }
        .menu-item:hover {
            transform: translateY(-10px);
        }
        h2 { margin: 15px 0 5px; font-size: 1.2rem; }
        p { margin: 0; color: #8b5a2b; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Welcome to Kawaii Cafe! 🌸</h1>
    <p>Tap your favorite drink to see it smile!</p>
    
    <div class="menu-container">
        <div class="menu-item">
            <coffee-cup-icon size="160px" color="#fef9f3"></coffee-cup-icon>
            <h2>Vanilla Latte</h2>
            <p>$4.50</p>
        </div>
        <div class="menu-item">
            <coffee-cup-icon size="160px" color="#dce775"></coffee-cup-icon>
            <h2>Matcha Green Tea</h2>
            <p>$5.00</p>
        </div>
        <div class="menu-item">
            <coffee-cup-icon size="160px" color="#ffcdd2"></coffee-cup-icon>
            <h2>Strawberry Mocha</h2>
            <p>$5.50</p>
        </div>
    </div>

    <!-- Make sure to include your component script! -->
    <script src="coffee-cup-icon.js"></script>
</body>
</html>
